<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSC Trading Dashboard - WEN Agency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="shared-utils.js"></script>
<style>
:root {
  --bg: #0a0e27;
  --bg2: #141829;
  --bg3: #1a1f35;
  --border: #2a3555;
  --text: #e8eef5;
  --text2: #8890b0;
  --primary: #00d4ff;
  --secondary: #378ADD;
  --success: #00d977;
  --danger: #ff4757;
  --warning: #ffa502;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, var(--bg) 0%, #0f1429 100%);
  color: var(--text);
  font-family: 'Segoe UI', -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.logo { display: flex; align-items: center; gap: 12px; }
.logo h1 { font-size: 24px; font-weight: 700; color: var(--primary); }
.logo p { font-size: 12px; color: var(--text2); }

.nav-links { display: flex; gap: 20px; }
.nav-links a {
  color: var(--text2);
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 6px;
  transition: all 0.3s;
  border: 1px solid transparent;
}
.nav-links a:hover {
  color: var(--primary);
  border-color: var(--primary);
  background: rgba(0, 212, 255, 0.1);
}

.container { max-width: 1600px; margin: 0 auto; padding: 40px; }

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.metric-card {
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  backdrop-filter: blur(10px);
}

.metric-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.metric-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.metric-change { font-size: 12px; color: var(--success); margin-top: 8px; }
.metric-change.negative { color: var(--danger); }

.ranking-section { margin-bottom: 40px; }
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }

.ranking-table {
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.ranking-table table {
  width: 100%;
  border-collapse: collapse;
}

.ranking-table th {
  background: rgba(0, 212, 255, 0.1);
  padding: 16px;
  text-align: left;
  font-weight: 600;
  color: var(--primary);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.ranking-table td {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.ranking-table tr:hover { background: rgba(0, 212, 255, 0.05); }
.ranking-table tr:last-child td { border-bottom: none; }

.rank-badge {
  display: inline-flex;
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  margin-right: 12px;
}

.trader-name { font-weight: 600; color: var(--primary); }
.win-rate { color: var(--success); font-weight: 600; }
.pnl-positive { color: var(--success); font-weight: 600; }
.pnl-negative { color: var(--danger); font-weight: 600; }

.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 30px;
  margin-bottom: 40px;
}

.chart-card {
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  height: 350px;
  backdrop-filter: blur(10px);
}

.chart-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; }
canvas { max-height: 280px; }

.action-buttons {
  display: flex;
  gap: 12px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 24px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 14px;
  text-decoration: none;
  display: inline-block;
}

.btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3); }

.btn-secondary { background: var(--bg3); color: var(--primary); border: 1px solid var(--primary); }
.btn-secondary:hover { background: rgba(0, 212, 255, 0.1); }

.last-update { color: var(--text2); font-size: 12px; text-align: center; margin-top: 40px; }

@media (max-width: 768px) {
  .container { padding: 20px; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>📊 RSC DASHBOARD</h1>
    <p>Trading Group - WEN Agency</p>
  </div>
  <div class="nav-links">
    <a href="upload-trades.html">📈 Upload</a>
    <a href="trading-journal.html">📊 Trading</a>
    <a href="backtesting-journal.html">🎯 Backtesting</a>
    <a href="traders-ranking.html">🏆 Ranking</a>
  </div>
</div>

<div class="container">
  <div class="action-buttons">
    <button class="btn btn-primary" onclick="goTo('upload-trades.html')">➕ Add Trades</button>
    <button class="btn btn-secondary" onclick="exportAllData()">📥 Export Data</button>
    <button class="btn btn-secondary" onclick="refreshData()">🔄 Refresh</button>
  </div>

  <div class="metrics-grid" id="metrics"></div>

  <div class="ranking-section">
    <h2 class="section-title">🏆 Traders Ranking</h2>
    <div class="ranking-table" id="ranking-table"></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📈 Total PnL by Trader</div>
      <canvas id="pnlChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">🎯 Win Rate Comparison</div>
      <canvas id="winRateChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">📊 Total Trades by Trader</div>
      <canvas id="tradesChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">💰 Profit Factor</div>
      <canvas id="profitFactorChart"></canvas>
    </div>
  </div>

  <div class="last-update" id="lastUpdate"></div>
</div>

<script>
let charts = {};

function goTo(page) {
  window.location.href = page;
}

function refreshData() {
  updateDashboard();
  Notification.success('✅ Data refreshed');
}

function updateDashboard() {
  const allData = StorageManager.getAllData();
  const ranking = Calculator.getTraderRanking();
  
  updateMetrics(ranking);
  updateRankingTable(ranking);
  updateCharts(ranking, allData);
  updateTimestamp();
}

function updateMetrics(ranking) {
  const totalTrades = ranking.reduce((sum, r) => sum + r.total, 0);
  const totalWins = ranking.reduce((sum, r) => sum + r.wins, 0);
  const totalPnL = ranking.reduce((sum, r) => sum + parseFloat(r.totalRR), 0);
  const avgWinRate = (ranking.reduce((sum, r) => sum + parseFloat(r.winRate), 0) / ranking.length).toFixed(1);

  const metricsHTML = `
    <div class="metric-card">
      <div class="metric-label">Total Trades</div>
      <div class="metric-value">${totalTrades}</div>
      <div class="metric-change">All traders</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total Wins</div>
      <div class="metric-value">${totalWins}</div>
      <div class="metric-change">${((totalWins/totalTrades)*100).toFixed(1)}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total PnL</div>
      <div class="metric-value ${totalPnL >= 0 ? '' : 'pnl-negative'}">${totalPnL >= 0 ? '+' : ''}${totalPnL.toFixed(2)}R</div>
      <div class="metric-change ${totalPnL >= 0 ? '' : 'negative'}">Combined</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Avg Win Rate</div>
      <div class="metric-value">${avgWinRate}%</div>
      <div class="metric-change">Group average</div>
    </div>
  `;

  document.getElementById('metrics').innerHTML = metricsHTML;
}

function updateRankingTable(ranking) {
  const rows = ranking.map((r, idx) => `
    <tr>
      <td><span class="rank-badge">${idx + 1}</span> <span class="trader-name">${r.trader}</span></td>
      <td>${r.total}</td>
      <td>${r.wins}</td>
      <td>${r.losses}</td>
      <td class="win-rate">${r.winRate}%</td>
      <td class="${parseFloat(r.totalRR) >= 0 ? 'pnl-positive' : 'pnl-negative'}">${parseFloat(r.totalRR) >= 0 ? '+' : ''}${r.totalRR}</td>
      <td>${r.avgRR}</td>
      <td>${r.profitFactor}</td>
    </tr>
  `).join('');

  const html = `
    <table>
      <thead>
        <tr>
          <th>Trader</th>
          <th>Trades</th>
          <th>Wins</th>
          <th>Loss</th>
          <th>Win Rate</th>
          <th>Total RR</th>
          <th>Avg RR</th>
          <th>Profit Factor</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  document.getElementById('ranking-table').innerHTML = html;
}

function updateCharts(ranking, allData) {
  const pnlCtx = document.getElementById('pnlChart').getContext('2d');
  if (charts.pnl) charts.pnl.destroy();
  charts.pnl = new Chart(pnlCtx, {
    type: 'bar',
    data: {
      labels: ranking.map(r => r.trader),
      datasets: [{
        label: 'Total RR',
        data: ranking.map(r => parseFloat(r.totalRR)),
        backgroundColor: ranking.map(r => parseFloat(r.totalRR) >= 0 ? 'rgba(0, 217, 119, 0.8)' : 'rgba(255, 71, 87, 0.8)'),
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8890b0' } },
        y: { grid: { display: false }, ticks: { color: '#8890b0' } }
      }
    }
  });

  const wrCtx = document.getElementById('winRateChart').getContext('2d');
  if (charts.wr) charts.wr.destroy();
  charts.wr = new Chart(wrCtx, {
    type: 'line',
    data: {
      labels: ranking.map(r => r.trader),
      datasets: [{
        label: 'Win Rate %',
        data: ranking.map(r => parseFloat(r.winRate)),
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0, 212, 255, 0.1)',
        borderWidth: 3,
        tension: 0.4,
        fill: true,
        pointRadius: 6,
        pointBackgroundColor: '#00d4ff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8890b0' } },
        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8890b0' } }
      }
    }
  });

  const tradesCtx = document.getElementById('tradesChart').getContext('2d');
  if (charts.trades) charts.trades.destroy();
  charts.trades = new Chart(tradesCtx, {
    type: 'doughnut',
    data: {
      labels: ranking.map(r => r.trader),
      datasets: [{
        data: ranking.map(r => r.total),
        backgroundColor: ['#00d4ff', '#378ADD', '#00d977', '#ffa502', '#ff4757'],
        borderColor: '#0a0e27',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  const pfCtx = document.getElementById('profitFactorChart').getContext('2d');
  if (charts.pf) charts.pf.destroy();
  charts.pf = new Chart(pfCtx, {
    type: 'radar',
    data: {
      labels: ranking.map(r => r.trader),
      datasets: [{
        label: 'Profit Factor',
        data: ranking.map(r => {
          const pf = typeof r.profitFactor === 'number' ? r.profitFactor : 0;
          return Math.min(pf, 5);
        }),
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0, 212, 255, 0.2)',
        borderWidth: 2,
        pointRadius: 5,
        pointBackgroundColor: '#00d4ff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          grid: { color: 'rgba(255,255,255,0.1)' },
          ticks: { color: '#8890b0' }
        }
      }
    }
  });
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('lastUpdate').innerHTML = `Last updated: ${now.toLocaleTimeString()}`;
}

function exportAllData() {
  const allData = StorageManager.getAllData();
  const csv = generateCSV(allData);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rsc-trading-export-${Date.now()}.csv`;
  a.click();
  Notification.success('✅ Data exported to CSV');
}

function generateCSV(allData) {
  const rows = [['Trader', 'Type', 'Date', 'Pair', 'Direction', 'RR', 'Result']];
  Object.entries(allData).forEach(([trader, data]) => {
    data.trades.forEach(t => {
      rows.push([trader, 'TRADE', t.date, t.pair, t.direction, t.rr, t.result]);
    });
    data.backtests.forEach(b => {
      rows.push([trader, 'BACKTEST', b.date, b.pair, b.direction, b.rr, b.result]);
    });
  });
  return rows.map(row => row.join(',')).join('\n');
}

RealtimeSync.init(() => updateDashboard());
updateDashboard();
</script>

</body>
</html>
