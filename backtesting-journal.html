<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtesting Journal - RSC Trading Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="shared-utils.js"></script>
<style>
:root {
  --bg: #0a0e27;
  --bg2: #141829;
  --bg3: #1a1f35;
  --border: #2a3555;
  --text: #e8eef5;
  --text2: #8890b0;
  --primary: #00d4ff;
  --secondary: #378ADD;
  --success: #00d977;
  --danger: #ff4757;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, var(--bg) 0%, #0f1429 100%); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

.header { background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 100%); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }

.logo { display: flex; align-items: center; gap: 12px; }
.logo h1 { font-size: 24px; font-weight: 700; color: var(--primary); }

.nav-links { display: flex; gap: 20px; }
.nav-links a { color: var(--text2); text-decoration: none; padding: 8px 16px; border-radius: 6px; transition: all 0.3s; }
.nav-links a:hover { color: var(--primary); background: rgba(0, 212, 255, 0.1); }

.container { max-width: 1400px; margin: 0 auto; padding: 40px; }

.trader-tabs { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
.tab { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.3s; font-weight: 600; }
.tab:hover { border-color: var(--primary); color: var(--primary); }
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }

.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
.metric { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
.metric-value { font-size: 28px; font-weight: 700; color: var(--primary); }
.metric-change { font-size: 12px; color: var(--success); margin-top: 8px; }

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; margin-bottom: 40px; }
.chart-card { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px; height: 350px; }
.chart-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; }
canvas { max-height: 280px; }

.filter-bar { display: flex; gap: 10px; margin-bottom: 24px; }
.filter-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.3s; }
.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.backtests-table { width: 100%; border-collapse: collapse; background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.backtests-table th { background: rgba(0, 212, 255, 0.1); padding: 16px; text-align: left; font-weight: 600; color: var(--primary); border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; }
.backtests-table td { padding: 16px; border-bottom: 1px solid var(--border); }
.backtests-table tr:hover { background: rgba(0, 212, 255, 0.05); }
.backtests-table tr:last-child td { border-bottom: none; }

.pair { font-weight: 600; color: var(--primary); }
.win { color: var(--success); font-weight: 600; }
.loss { color: var(--danger); font-weight: 600; }

.strategy-badge { display: inline-block; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--text2); }

.action-btn { padding: 6px 12px; background: var(--danger); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
.action-btn:hover { background: #ff6873; }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-state p { color: var(--text2); margin-bottom: 20px; }
.empty-state a { display: inline-block; padding: 12px 24px; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }

@media (max-width: 768px) {
  .container { padding: 20px; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>🎯 BACKTESTING JOURNAL</h1>
  </div>
  <div class="nav-links">
    <a href="index.html">📊 Dashboard</a>
    <a href="upload-trades.html">📥 Upload</a>
    <a href="trading-journal.html">📈 Trading</a>
  </div>
</div>

<div class="container">
  <div class="trader-tabs" id="trader-tabs"></div>
  <div class="metrics" id="metrics"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📊 Win Rate par Mois</div>
      <canvas id="winRateChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">💰 RR Distribution</div>
      <canvas id="rrChart"></canvas>
    </div>
  </div>

  <div style="background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px;">
    <h2 style="margin-bottom: 24px; font-size: 18px; color: var(--primary);">Backtests</h2>
    
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterBacktests('all')">Tous</button>
      <button class="filter-btn" onclick="filterBacktests('win')">✅ Wins</button>
      <button class="filter-btn" onclick="filterBacktests('loss')">❌ Loss</button>
    </div>

    <div id="backtests-container"></div>
  </div>
</div>

<script>
const TRADERS = ['Nassim', 'Noa', 'Joseph', 'Owen', 'Tom'];
let currentTrader = 'Nassim';
let currentFilter = 'all';
let charts = {};

function init() {
  renderTraderTabs();
  updateDisplay();
  RealtimeSync.init(() => updateDisplay());
}

function renderTraderTabs() {
  const html = TRADERS.map(t => 
    `<button class="tab ${t === currentTrader ? 'active' : ''}" onclick="switchTrader('${t}')">${t}</button>`
  ).join('');
  document.getElementById('trader-tabs').innerHTML = html;
}

function switchTrader(trader) {
  currentTrader = trader;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  currentFilter = 'all';
  updateDisplay();
}

function updateDisplay() {
  const backtests = StorageManager.loadBacktests(currentTrader);
  updateMetrics(backtests);
  updateCharts(backtests);
  renderBacktests(backtests);
}

function updateMetrics(backtests) {
  const stats = Calculator.calculateStats(backtests);
  const html = `
    <div class="metric">
      <div class="metric-label">Total Backtests</div>
      <div class="metric-value">${stats.total}</div>
      <div class="metric-change">${currentTrader}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Win Rate</div>
      <div class="metric-value" style="color: var(--success);">${stats.winRate}%</div>
      <div class="metric-change">${stats.wins}W / ${stats.losses}L</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total RR</div>
      <div class="metric-value" style="color: ${stats.totalRR >= 0 ? 'var(--success)' : 'var(--danger)'};">${stats.totalRR >= 0 ? '+' : ''}${stats.totalRR}</div>
      <div class="metric-change">PnL</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg RR</div>
      <div class="metric-value">${stats.avgRR >= 0 ? '+' : ''}${stats.avgRR}</div>
      <div class="metric-change">Per Test</div>
    </div>
    <div class="metric">
      <div class="metric-label">Profit Factor</div>
      <div class="metric-value">${stats.profitFactor}</div>
      <div class="metric-change">PF</div>
    </div>
  `;
  document.getElementById('metrics').innerHTML = html;
}

function updateCharts(backtests) {
  const wrCtx = document.getElementById('winRateChart').getContext('2d');
  if (charts.wr) charts.wr.destroy();
  charts.wr = new Chart(wrCtx, ChartManager.createWinRateChart(wrCtx, backtests));

  const rrCtx = document.getElementById('rrChart').getContext('2d');
  if (charts.rr) charts.rr.destroy();
  charts.rr = new Chart(rrCtx, ChartManager.createRRDistributionChart(rrCtx, backtests));
}

function renderBacktests(allBacktests) {
  const filtered = currentFilter === 'all' 
    ? allBacktests 
    : allBacktests.filter(b => b.result === (currentFilter === 'win' ? 'WIN' : 'LOSS'));

  if (filtered.length === 0) {
    document.getElementById('backtests-container').innerHTML = `
      <div class="empty-state">
        <p>Aucun backtest trouvé</p>
        <a href="upload-trades.html">➕ Ajouter des backtests</a>
      </div>
    `;
    return;
  }

  const html = `
    <table class="backtests-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Paire</th>
          <th>Direction</th>
          <th>RR</th>
          <th>Stratégie</th>
          <th>Résultat</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map((b, i) => `
          <tr>
            <td>${b.date}</td>
            <td class="pair">${b.pair}</td>
            <td>${b.direction}</td>
            <td>${parseFloat(b.rr) > 0 ? '+' : ''}${b.rr}R</td>
            <td><span class="strategy-badge">${b.strategy || 'N/A'}</span></td>
            <td class="${b.result === 'WIN' ? 'win' : b.result === 'LOSS' ? 'loss' : ''}">${b.result}</td>
            <td><button class="action-btn" onclick="deleteBacktest(${i})">Supprimer</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('backtests-container').innerHTML = html;
}

function filterBacktests(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderBacktests(StorageManager.loadBacktests(currentTrader));
}

function deleteBacktest(index) {
  if (confirm('Supprimer ce backtest ?')) {
    const backtests = StorageManager.loadBacktests(currentTrader);
    backtests.splice(index, 1);
    StorageManager.saveBacktests(currentTrader, backtests);
    updateDisplay();
    Notification.success('✅ Backtest supprimé');
  }
}

window.onload = init;
</script>

</body>
</html>
