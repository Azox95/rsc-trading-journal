<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSC Backtesting Journal — WEN Agency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
--bg: #0f0f0f;
--bg2: #1a1a1a;
--bg3: #222;
--border: #2a2a2a;
--text: #f0f0f0;
--text2: #888;
--text3: #555;
--primary: #7c3aed;
--primary2: #6d28d9;
--success: #4caf50;
--danger: #E24B4A;
--warning: #f0a030;
--radius: 10px;
--radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text h1 { font-size: 16px; font-weight: 600; }
.logo-text p { font-size: 12px; color: var(--text2); }
.member-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: var(--bg3); color: var(--text2); transition: all .15s; font-weight: 500; }
.tab:hover { border-color: var(--primary); color: var(--text); }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.tab.groupe { background: #3a1a2e; color: #c084fc; border-color: #4a2a4e; }
.tab.groupe.active { background: var(--primary2); color: #fff; }

.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 600; }
.metric-value.primary { color: var(--primary); }
.metric-value.green { color: var(--success); }
.metric-value.red { color: var(--danger); }
.metric-value.amber { color: var(--warning); }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

.charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
@media(max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.chart-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; font-weight: 500; }
.chart-wrap { position: relative; width: 100%; }
.pie-legend { display: flex; gap: 14px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.pie-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.pie-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
.form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.form-title { font-size: 13px; font-weight: 600; }
.form-rule { font-size: 11px; color: var(--primary); background: #3a1a2e; border: 1px solid #4a2a4e; padding: 3px 8px; border-radius: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select {
width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; transition: border .15s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.form-group select option { background: var(--bg3); }
.form-bottom { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.form-bottom input { flex: 1; min-width: 150px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; }
.form-bottom input:focus { border-color: var(--primary); }
.btn-add { background: var(--primary); color: #fff; border: none; padding: 8px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s; }
.btn-add:hover { background: var(--primary2); }

.ai-section { background: var(--bg2); border: 2px solid var(--primary); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
.ai-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.ai-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px; font-size: 13px; font-family: monospace; resize: vertical; min-height: 80px; outline: none; margin-bottom: 10px; }
.ai-textarea:focus { border-color: var(--primary); }
.ai-button { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
.ai-button:hover { background: var(--primary2); }
.ai-response { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; font-size: 12px; color: var(--text2); max-height: 200px; overflow-y: auto; display: none; }

.table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; overflow-x: auto; }
.table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.table-title { font-size: 13px; font-weight: 600; }
.btn-clear { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; transition: all .15s; }
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th { text-align: left; padding: 8px 10px; color: var(--text3); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
td { padding: 9px 10px; border-bottom: 1px solid #1e1e1e; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge.win { background: #1a2e1a; color: var(--success); }
.badge.loss { background: #2e1a1a; color: var(--danger); }
.badge.be { background: #2a2010; color: var(--warning); }
.badge.long { background: #1a2a3e; color: #5ba3f5; }
.badge.short { background: #2e1a2a; color: #e06090; }
.btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: color .15s; }
.btn-del:hover { color: var(--danger); }
.empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media(max-width: 900px) { .analysis-grid { grid-template-columns: 1fr; } }
.analysis-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.analysis-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.analysis-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e1e1e; font-size: 12px; }
.analysis-item:last-child { border-bottom: none; }
.analysis-label { color: var(--text2); }
.analysis-val { font-weight: 600; }
</style>
</head>
<body>

<div class="header">
<div class="logo">
<div class="logo-icon">📈</div>
<div class="logo-text">
<h1>RSC Backtesting Journal</h1>
<p>WEN Agency — Analyse & Validation de Stratégies</p>
</div>
</div>
<div class="member-tabs">
<div class="tab active" onclick="switchMember('Nassim',this)">Nassim</div>
<div class="tab" onclick="switchMember('Noa',this)">Noa</div>
<div class="tab" onclick="switchMember('Joseph',this)">Joseph</div>
<div class="tab" onclick="switchMember('Owen',this)">Owen</div>
<div class="tab" onclick="switchMember('Nedrix',this)">Nedrix</div>
<div class="tab groupe" onclick="switchMember('GROUPE',this)">👥 GROUPE</div>
</div>
</div>

<div class="main">
<div id="app-content"></div>
</div>

<script>
const MEMBERS = ['Nassim','Noa','Joseph','Owen','Nedrix'];
const PAIRS = ['EUR/USD','GBP/USD','USD/JPY','AUD/USD','EUR/JPY','GBP/JPY','USD/CHF','USD/CAD','EUR/GBP','EUR/AUD','GBP/AUD','AUD/JPY','AUD/CAD','CAD/JPY','EUR/CAD','GBP/CAD','AUDJPY'];
const TIMEFRAMES = ['1M','5M','15M','30M','1H','4H','Daily'];

let currentMember = 'Nassim';
let perfChart, pieChart, rrChart;

function loadBacktests(m) { try { return JSON.parse(localStorage.getItem('rsc_backtests_'+m)||'[]'); } catch(e) { return []; } }
function saveBacktests(m,t) { try { localStorage.setItem('rsc_backtests_'+m, JSON.stringify(t)); } catch(e) {} }

function getStats(backtests) {
const wins = backtests.filter(t=>t.result==='WIN');
const losses = backtests.filter(t=>t.result==='LOSS');
const bes = backtests.filter(t=>t.result==='BE');
const cumRR = backtests.reduce((s,t)=>s+(t.result==='WIN'?parseFloat(t.rr||0):(t.result==='LOSS'?-parseFloat(t.rr||1):0)),0);
const avgRR = wins.length ? wins.reduce((s,t)=>s+parseFloat(t.rr||0),0)/wins.length : 0;
const wr = backtests.length ? Math.round(wins.length/backtests.length*100) : 0;
const pf = losses.length ? (wins.length * avgRR) / (losses.length * 1) : (wins.length ? avgRR : 0);
const maxWin = wins.length ? Math.max(...wins.map(t=>parseFloat(t.rr||0))) : 0;
return {wins:wins.length, losses:losses.length, bes:bes.length, total:backtests.length, cumRR, avgRR, wr, pf:pf.toFixed(2), maxWin};
}

function switchMember(m, el) {
currentMember = m;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
destroyCharts();
render();
}

function destroyCharts() {
[perfChart, pieChart, rrChart].forEach(c=>{if(c){c.destroy();}});
perfChart=pieChart=rrChart=null;
}

function render() {
if(currentMember === 'GROUPE') { renderGroupe(); return; }
const backtests = loadBacktests(currentMember);
const s = getStats(backtests);

document.getElementById('app-content').innerHTML = `
<div style="margin-bottom:16px;display:flex;align-items:center;gap:8px">
<span style="font-size:20px">📈</span>
<div>
<div style="font-size:15px;font-weight:600">${currentMember} — Backtests</div>
<div style="font-size:12px;color:#666">Journal des backtests isolés de la stratégie RSC</div>
</div>
</div>

<div class="metrics" id="metrics"></div>

<div class="charts-grid">
<div class="chart-card"><div class="chart-title">Courbe de performance (R cumulé)</div><div class="chart-wrap" style="height:200px"><canvas id="perfChart"></canvas></div></div>
<div class="chart-card"><div class="chart-title">Répartition Win / Loss / BE</div><div class="chart-wrap" style="height:160px"><canvas id="pieChart"></canvas></div><div class="pie-legend" id="pieLegend"></div></div>
</div>

<div class="analysis-grid">
<div class="analysis-card"><div class="analysis-title">Paires les plus testées</div><div id="pairAnalysis"></div></div>
<div class="analysis-card"><div class="analysis-title">Performance par Timeframe</div><div id="tfAnalysis"></div></div>
</div>

<div class="ai-section">
<div class="ai-title">🤖 Assistant IA Claude — Backtesting</div>
<div style="font-size:12px;color:#666;margin-bottom:10px">Colle tes résultats de backtest pour extraction automatique</div>
<textarea class="ai-textarea" id="aiInput" placeholder="Ex: EUR/USD Buy 15M +2.5RR WIN"></textarea>
<div style="display:flex;gap:8px">
<button class="ai-button" onclick="parseWithAI()">Analyser avec IA</button>
<button class="ai-button" onclick="document.getElementById('aiInput').value='';" style="background:#555">Effacer</button>
</div>
<div class="ai-response" id="aiResponse"></div>
</div>

<div class="form-card">
<div class="form-header">
<div class="form-title">➕ Ajouter un backtest</div>
<div class="form-rule">✓ Données séparées du trading réel</div>
</div>
<div class="form-grid">
<div class="form-group"><label>Date test</label><input type="date" id="f-date"/></div>
<div class="form-group"><label>Paire</label><select id="f-pair">${PAIRS.map(p=>'<option>'+p+'</option>').join('')}</select></div>
<div class="form-group"><label>Direction</label><select id="f-dir"><option>LONG</option><option>SHORT</option></select></div>
<div class="form-group"><label>Timeframe</label><select id="f-tf">${TIMEFRAMES.map(tf=>'<option>'+tf+'</option>').join('')}</select></div>
<div class="form-group"><label>RR réalisé</label><input type="number" id="f-rr" placeholder="ex: 2.5" step="0.1"/></div>
<div class="form-group"><label>Résultat</label><select id="f-result"><option>WIN</option><option>LOSS</option><option>BE</option></select></div>
<div class="form-group"><label>Stratégie testée</label><input type="text" id="f-strategy" placeholder="ex: Poupée Russe HTF"/></div>
</div>
<div class="form-bottom">
<input type="text" id="f-notes" placeholder="Observations / ajustements..."/>
<button class="btn-add" onclick="addBacktest()">Ajouter backtest</button>
</div>
</div>

<div class="table-card">
<div class="table-header">
<div class="table-title">📋 Historique des backtests</div>
<button class="btn-clear" onclick="clearBacktests()">Effacer tout</button>
</div>
<div id="backtest-list"></div>
</div>
`;

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
renderMetrics(s);
renderPerfChart(backtests);
renderPieChart(s);
renderPairAnalysis(backtests);
renderTFAnalysis(backtests);
renderBacktestList(backtests);
}

function renderMetrics(s) {
document.getElementById('metrics').innerHTML = `
<div class="metric"><div class="metric-label">Backtests total</div><div class="metric-value primary">${s.total}</div></div>
<div class="metric"><div class="metric-label">Winrate</div><div class="metric-value ${s.wr>=50?'green':'red'}">${s.wr}%</div></div>
<div class="metric"><div class="metric-label">RR cumulé</div><div class="metric-value ${s.cumRR>=0?'green':'red'}">${s.cumRR.toFixed(2)}R</div></div>
<div class="metric"><div class="metric-label">RR moyen (wins)</div><div class="metric-value amber">${s.avgRR.toFixed(2)}R</div></div>
<div class="metric"><div class="metric-label">Profit Factor</div><div class="metric-value" style="color:${s.pf>=1.2?'var(--success)':'var(--danger)'}">${s.pf}</div></div>
<div class="metric"><div class="metric-label">Wins</div><div class="metric-value green">${s.wins}</div></div>
<div class="metric"><div class="metric-label">Losses</div><div class="metric-value red">${s.losses}</div></div>
`;
}

function renderPerfChart(backtests) {
const ctx = document.getElementById('perfChart');
if(!ctx) return;
if(!backtests.length){ctx.parentElement.innerHTML='<div class="empty">Aucun backtest — commence tes analyses</div>';return;}
let cum=0; const labels=[],data=[];
backtests.forEach((t,i)=>{cum+=t.result==='WIN'?parseFloat(t.rr||0):(t.result==='LOSS'?-parseFloat(t.rr||1):0); labels.push('BT'+(i+1)); data.push(parseFloat(cum.toFixed(2)));});
perfChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'RR cumulé',data,borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,0.1)',borderWidth:2,pointRadius:3,fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#666',maxTicksLimit:10}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#666',callback:v=>v+'R'}}}}});
}

function renderPieChart(s) {
const ctx = document.getElementById('pieChart');
if(!ctx) return;
if(!s.total){ctx.parentElement.innerHTML='<div style="height:160px;display:flex;align-items:center;justify-content:center;color:#444;font-size:13px">Aucun backtest</div>';return;}
pieChart=new Chart(ctx,{type:'doughnut',data:{labels:['WIN','LOSS','BE'],datasets:[{data:[s.wins,s.losses,s.bes],backgroundColor:['#4caf50','#E24B4A','#f0a030'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}});
document.getElementById('pieLegend').innerHTML=`<div class="pie-legend-item"><div class="pie-legend-dot" style="background:#4caf50"></div>WIN ${s.wins}</div><div class="pie-legend-item"><div class="pie-legend-dot" style="background:#E24B4A"></div>LOSS ${s.losses}</div><div class="pie-legend-item"><div class="pie-legend-dot" style="background:#f0a030"></div>BE ${s.bes}</div>`;
}

function renderPairAnalysis(backtests) {
const pairs={};
backtests.forEach(t=>{if(!pairs[t.pair]) pairs[t.pair]={wins:0,losses:0,rr:0}; if(t.result==='WIN'){pairs[t.pair].wins++; pairs[t.pair].rr+=parseFloat(t.rr||0);} else if(t.result==='LOSS'){pairs[t.pair].losses++; pairs[t.pair].rr-=parseFloat(t.rr||1);}});
const html=Object.entries(pairs).sort((a,b)=>b[1].rr-a[1].rr).slice(0,5).map(([p,d])=>`<div class="analysis-item"><span class="analysis-label">${p}</span><span class="analysis-val" style="color:${d.rr>=0?'var(--success)':'var(--danger)'}">${d.rr.toFixed(2)}R (${d.wins}W/${d.losses}L)</span></div>`).join('');
document.getElementById('pairAnalysis').innerHTML=html||'<div style="color:#444;font-size:12px">—</div>';
}

function renderTFAnalysis(backtests) {
const tfs={};
backtests.forEach(t=>{if(!tfs[t.tf]) tfs[t.tf]={wins:0,losses:0,rr:0}; if(t.result==='WIN'){tfs[t.tf].wins++; tfs[t.tf].rr+=parseFloat(t.rr||0);} else if(t.result==='LOSS'){tfs[t.tf].losses++; tfs[t.tf].rr-=parseFloat(t.rr||1);}});
const html=Object.entries(tfs).sort((a,b)=>b[1].rr-a[1].rr).map(([tf,d])=>`<div class="analysis-item"><span class="analysis-label">${tf}</span><span class="analysis-val" style="color:${d.rr>=0?'var(--success)':'var(--danger)'}">${d.rr.toFixed(2)}R (${d.wins}W/${d.losses}L)</span></div>`).join('');
document.getElementById('tfAnalysis').innerHTML=html||'<div style="color:#444;font-size:12px">—</div>';
}

function renderBacktestList(backtests) {
const el=document.getElementById('backtest-list');
if(!backtests.length){el.innerHTML='<div class="empty">Aucun backtest enregistré</div>';return;}
let html='<table><thead><tr><th>Date</th><th>Paire</th><th>Dir.</th><th>TF</th><th>RR</th><th>Résultat</th><th>Stratégie</th><th>Notes</th><th></th></tr></thead><tbody>';
[...backtests].reverse().forEach((t,ri)=>{const i=backtests.length-1-ri; html+=`<tr><td style="color:#666;font-size:12px">${t.date||'—'}</td><td>${t.pair}</td><td><span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></td><td style="color:#666;font-size:12px">${t.tf}</td><td style="font-weight:600;color:${parseFloat(t.rr)>0?'#4caf50':'#E24B4A'}">${t.rr}R</td><td><span class="badge ${t.result.toLowerCase()}">${t.result}</span></td><td style="font-size:12px;color:#666">${t.strategy||'—'}</td><td style="color:#666;font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis">${t.notes||'—'}</td><td><button class="btn-del" onclick="deleteBacktest(${i})">✕</button></td></tr>`;});
el.innerHTML=html+'</tbody></table>';
}

function addBacktest() {
const date=document.getElementById('f-date').value; const pair=document.getElementById('f-pair').value; const dir=document.getElementById('f-dir').value; const tf=document.getElementById('f-tf').value; const rr=parseFloat(document.getElementById('f-rr').value); const result=document.getElementById('f-result').value; const strategy=document.getElementById('f-strategy').value; const notes=document.getElementById('f-notes').value;
if(!date||!rr){alert('⚠️ Date et RR obligatoires');return;}
const backtests=loadBacktests(currentMember); backtests.push({date,pair,dir,tf,rr,result,strategy,notes}); saveBacktests(currentMember,backtests);
document.getElementById('f-rr').value=''; document.getElementById('f-strategy').value=''; document.getElementById('f-notes').value='';
destroyCharts(); render();
}

function deleteBacktest(i) { if(!confirm('Supprimer ?')) return; const backtests=loadBacktests(currentMember); backtests.splice(i,1); saveBacktests(currentMember,backtests); destroyCharts(); render(); }
function clearBacktests() { if(!confirm('Effacer TOUS les backtests ?')) return; saveBacktests(currentMember,[]); destroyCharts(); render(); }

async function parseWithAI() {
const input=document.getElementById('aiInput').value.trim(); if(!input) {alert('Colle un texte'); return;}
const resp=document.getElementById('aiResponse'); resp.style.display='block'; resp.textContent='📡 Analyse en cours...';
try { const result=await fetch('https://api.anthropic.com/v1/messages', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'claude-sonnet-4-6', max_tokens:500, messages:[{role:'user', content:`Tu es un assistant pour un journal de backtesting. Extrait automatiquement les informations du texte suivant et réponds en JSON: date, paire, direction (LONG/SHORT), timeframe, RR, résultat (WIN/LOSS/BE), stratégie testée, notes.\n\nTexte: ${input}\n\nRéponds UNIQUEMENT en JSON valide.`}]})}); const data=await result.json(); const text=data.content[0].text; const parsed=JSON.parse(text); resp.textContent='✅ '+JSON.stringify(parsed, null, 2); } catch(e) { resp.textContent='❌ Erreur: '+e.message; } }

function renderGroupe() {
let allBacktests=[]; const memberStats=MEMBERS.map(m=>{const b=loadBacktests(m); allBacktests=[...allBacktests,...b.map(bt=>({...bt,member:m}))]; return {name:m,...getStats(b)};});
const global=getStats(allBacktests);
document.getElementById('app-content').innerHTML=`<div style="margin-bottom:16px"><div style="font-size:15px;font-weight:600">👥 GROUPE — Backtesting collectif</div></div><div class="metrics"><div class="metric"><div class="metric-label">Backtests groupe</div><div class="metric-value primary">${global.total}</div></div><div class="metric"><div class="metric-label">Winrate groupe</div><div class="metric-value ${global.wr>=50?'green':'red'}">${global.wr}%</div></div><div class="metric"><div class="metric-label">RR cumulé</div><div class="metric-value ${global.cumRR>=0?'green':'red'}">${global.cumRR.toFixed(2)}R</div></div><div class="metric"><div class="metric-label">Profit Factor</div><div class="metric-value" style="color:${global.pf>=1.2?'var(--success)':'var(--danger)'}">${global.pf}</div></div></div><div style="font-size:13px;font-weight:600;margin:20px 0">📊 Stats par membre</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">${memberStats.map(m=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px"><div style="font-weight:600;color:var(--primary);margin-bottom:8px">${m.name}</div><div style="font-size:12px;line-height:1.6"><div>Backtests: <strong>${m.total}</strong></div><div>Winrate: <strong style="color:${m.wr>=50?'var(--success)':'var(--danger)'}">${m.wr}%</strong></div><div>RR cumulé: <strong style="color:${m.cumRR>=0?'var(--success)':'var(--danger)'}">${m.cumRR.toFixed(2)}R</strong></div><div>Wins: <strong style="color:var(--success)">${m.wins}</strong></div></div></div>`).join('')}</div>`;
}

render();
</script>
