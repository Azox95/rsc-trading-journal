<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Trades - RSC Trading Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="shared-utils.js"></script>
<style>
:root {
  --bg: #0a0e27;
  --bg2: #141829;
  --bg3: #1a1f35;
  --border: #2a3555;
  --text: #e8eef5;
  --text2: #8890b0;
  --primary: #00d4ff;
  --secondary: #378ADD;
  --success: #00d977;
  --danger: #ff4757;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, var(--bg) 0%, #0f1429 100%); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

.header { background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 100%); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }

.logo { display: flex; align-items: center; gap: 12px; }
.logo h1 { font-size: 24px; font-weight: 700; color: var(--primary); }
.logo p { font-size: 12px; color: var(--text2); }

.nav-links { display: flex; gap: 20px; }
.nav-links a { color: var(--text2); text-decoration: none; padding: 8px 16px; border-radius: 6px; transition: all 0.3s; border: 1px solid transparent; }
.nav-links a:hover { color: var(--primary); border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

.container { max-width: 1200px; margin: 0 auto; padding: 40px; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

.card { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 32px; backdrop-filter: blur(10px); }

.card-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 24px; }

label { display: block; font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 8px; }

select, textarea { width: 100%; background: rgba(26, 31, 53, 0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-size: 14px; font-family: monospace; outline: none; margin-bottom: 12px; transition: all 0.3s; }

select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }

textarea { resize: vertical; min-height: 250px; }

.btn-group { display: flex; gap: 12px; margin-top: 24px; }

.btn { flex: 1; padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; text-decoration: none; display: inline-block; }

.btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3); }

.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #ff6873; }

.info { background: rgba(0, 217, 119, 0.1); border: 1px solid rgba(0, 217, 119, 0.3); border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 13px; color: var(--success); }

.result { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 24px; font-size: 13px; display: none; line-height: 1.6; }

.result.show { display: block; }
.result.success { border-color: var(--success); background: rgba(0, 217, 119, 0.05); }
.result.error { border-color: var(--danger); background: rgba(255, 71, 87, 0.05); }

.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: rgba(26, 31, 53, 0.5); border-radius: 8px; overflow: hidden; }

.preview-table th { background: rgba(0, 212, 255, 0.1); padding: 12px; text-align: left; font-weight: 600; color: var(--primary); border-bottom: 1px solid var(--border); }

.preview-table td { padding: 12px; border-bottom: 1px solid var(--border); }

.preview-table tr:hover { background: rgba(0, 212, 255, 0.05); }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin: 20px 0; }

.stat-box { background: rgba(0, 212, 255, 0.1); padding: 12px; border-radius: 6px; text-align: center; border: 1px solid var(--border); }

.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--primary); margin-top: 4px; }

.success-msg { color: var(--success); font-weight: 600; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>📊 UPLOAD TRADES</h1>
    <p>RSC Trading Journal</p>
  </div>
  <div class="nav-links">
    <a href="index.html">📈 Dashboard</a>
    <a href="trading-journal.html">📊 Trading</a>
    <a href="backtesting-journal.html">🎯 Backtesting</a>
  </div>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-title">1️⃣ Trader</div>
      <label>Sélectionne le trader</label>
      <select id="trader">
        <option value="">-- Choisir --</option>
        <option value="Nassim">🔴 Nassim</option>
        <option value="Noa">🟢 Noa</option>
        <option value="Joseph">🟡 Joseph</option>
        <option value="Owen">🔵 Owen</option>
        <option value="Tom">⚪ Tom</option>
      </select>

      <div class="card-title" style="margin-top: 24px;">2️⃣ Type</div>
      <label>Sélectionne le type</label>
      <select id="type">
        <option value="">-- Choisir --</option>
        <option value="trading">📈 Trading Journal</option>
        <option value="backtesting">📊 Backtesting Journal</option>
      </select>
    </div>

    <div class="card">
      <div class="card-title">3️⃣ Tableau (Copie/Colle)</div>
      <div class="info">💡 Format: Colle un tableau avec colonnes séparées par | ou TAB<br/>📋 Colonnes: Paire, Date, RR, Direction</div>
      <textarea id="data" placeholder="Paire | Date | RR | Direction&#10;EUR/USD | 01/06/25 | +2R | LONG&#10;GBP/USD | 02/06/25 | -1R | SHORT"></textarea>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="parseAndImport()">🚀 Importer</button>
        <button class="btn btn-danger" onclick="clearForm()">🗑️ Effacer</button>
      </div>
    </div>
  </div>

  <div id="result" class="result"></div>

  <div id="preview" style="display:none;">
    <div class="card">
      <div class="success-msg">✅ Trades parsés avec succès !</div>
      <div class="stats" id="stats"></div>
      <table class="preview-table">
        <thead>
          <tr>
            <th>Paire</th>
            <th>Date</th>
            <th>Direction</th>
            <th>RR</th>
            <th>Résultat</th>
          </tr>
        </thead>
        <tbody id="previewTable"></tbody>
      </table>
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="goToJournal()">➡️ Voir le journal</button>
        <button class="btn btn-danger" onclick="document.getElementById('preview').style.display='none'; clearForm();">Importer à nouveau</button>
      </div>
    </div>
  </div>
</div>

<script>
const PAIRS = ['EUR/USD','GBP/USD','USD/JPY','AUD/USD','EUR/JPY','GBP/JPY','USD/CHF','USD/CAD','EUR/GBP','AUD/JPY'];

function clearForm() {
  document.getElementById('trader').value = '';
  document.getElementById('type').value = '';
  document.getElementById('data').value = '';
  document.getElementById('result').classList.remove('show');
}

function showError(msg) {
  const result = document.getElementById('result');
  result.className = 'result show error';
  result.innerHTML = msg;
}

function showSuccess(msg) {
  const result = document.getElementById('result');
  result.className = 'result show success';
  result.innerHTML = msg;
}

function parsePair(text) {
  text = text.trim().toUpperCase();
  for (let p of PAIRS) {
    if (text.includes(p.toUpperCase())) {
      return p.includes('/') ? p : p.substring(0,3) + '/' + p.substring(3);
    }
  }
  return text;
}

function parseDate(text) {
  text = text.trim();
  const match = text.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (!match) return null;
  let [_, d, m, y] = match;
  if (y.length === 2) y = '20' + y;
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

function parseRR(text) {
  text = text.trim().toUpperCase();
  text = text.replace(/,/g, '.');
  if (text === 'BE' || text === '0') return 0;
  const match = text.match(/([-+]?\d+\.?\d*)/);
  return match ? parseFloat(match[1]) : null;
}

function parseDirection(text) {
  text = text.toUpperCase().trim();
  if (text.includes('LONG') || text.includes('BUY') || text.includes('ACHETEUR')) return 'LONG';
  if (text.includes('SHORT') || text.includes('SELL') || text.includes('VENDEUR')) return 'SHORT';
  return 'LONG';
}

function parseTable(data) {
  const lines = data.split('\n').filter(line => line.trim() && !line.includes('---'));
  
  if (lines.length < 2) throw new Error('Minimum 2 lignes requises (header + data)');

  const headerLine = lines[0];
  const delimiter = headerLine.includes('|') ? '|' : '\t';
  
  const headers = headerLine.split(delimiter).map(h => h.trim().toLowerCase()).filter(h => h);

  if (headers.length < 2) throw new Error('Minimum 2 colonnes requises');

  const trades = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    const values = line.split(delimiter).map(v => v.trim()).filter(v => v);
    if (values.length < 2) continue;

    const trade = {};
    headers.forEach((header, idx) => {
      trade[header] = values[idx] || '';
    });

    const pair = parsePair(trade['paire'] || trade['pair'] || trade['actif'] || values[0]);
    const date = parseDate(trade['date'] || values[1] || values[0]);
    const rr = parseRR(trade['rr'] || trade['r:r'] || trade['gain'] || values[2] || '0');
    const direction = parseDirection(trade['direction'] || trade['dir'] || values[3] || 'LONG');
    
    let result = 'PENDING';
    if (rr !== null) {
      if (rr === 0) result = 'BE';
      else if (rr > 0) result = 'WIN';
      else result = 'LOSS';
    }

    if (pair && date && rr !== null) {
      trades.push({ pair, date, direction, rr, result, tf: '15M', session: '', risk: 1, notes: '' });
    }
  }

  return trades;
}

function displayPreview(trades) {
  const tbody = document.getElementById('previewTable');
  tbody.innerHTML = trades.map(t => {
    const resultClass = t.result === 'WIN' ? 'style="color: #00d977;"' : t.result === 'LOSS' ? 'style="color: #ff4757;"' : '';
    return `<tr><td>${t.pair}</td><td>${t.date}</td><td>${t.direction}</td><td>${t.rr > 0 ? '+' : ''}${t.rr}R</td><td ${resultClass}>${t.result}</td></tr>`;
  }).join('');

  const wins = trades.filter(t => t.result === 'WIN').length;
  const losses = trades.filter(t => t.result === 'LOSS').length;
  const wr = trades.length > 0 ? ((wins / trades.length) * 100).toFixed(1) : 0;
  const avgRR = trades.length > 0 ? (trades.reduce((sum, t) => sum + t.rr, 0) / trades.length).toFixed(2) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value">${trades.length}</div></div>
    <div class="stat-box"><div class="stat-label">Win Rate</div><div class="stat-value">${wr}%</div></div>
    <div class="stat-box"><div class="stat-label">Avg RR</div><div class="stat-value">${avgRR}</div></div>
    <div class="stat-box"><div class="stat-label">W / L</div><div class="stat-value">${wins} / ${losses}</div></div>
  `;

  document.getElementById('preview').style.display = 'block';
}

function parseAndImport() {
  const trader = document.getElementById('trader').value;
  const type = document.getElementById('type').value;
  const data = document.getElementById('data').value.trim();

  if (!trader) { showError('❌ Sélectionne un trader'); return; }
  if (!type) { showError('❌ Sélectionne un type'); return; }
  if (!data) { showError('❌ Colle un tableau'); return; }

  try {
    const trades = parseTable(data);
    
    if (trades.length === 0) {
      showError('❌ Aucune donnée parsée');
      return;
    }

    if (type === 'trading') {
      const current = StorageManager.loadTrades(trader);
      current.push(...trades);
      StorageManager.saveTrades(trader, current);
    } else {
      const current = StorageManager.loadBacktests(trader);
      current.push(...trades);
      StorageManager.saveBacktests(trader, current);
    }

    showSuccess(`✅ ${trades.length} trade(s) importé(s) ! 🎉<br/><strong>Trader:</strong> ${trader}`);
    displayPreview(trades);

  } catch (e) {
    showError(`❌ Erreur: ${e.message}`);
  }
}

function goToJournal() {
  const type = document.getElementById('type').value;
  window.location.href = type === 'trading' ? 'trading-journal.html' : 'backtesting-journal.html';
}
</script>

</body>
</html>
