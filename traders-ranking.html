<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traders Ranking - RSC Trading Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="shared-utils.js"></script>
<style>
:root {
  --bg: #0a0e27;
  --bg2: #141829;
  --bg3: #1a1f35;
  --border: #2a3555;
  --text: #e8eef5;
  --text2: #8890b0;
  --primary: #00d4ff;
  --secondary: #378ADD;
  --success: #00d977;
  --danger: #ff4757;
  --warn: #ffa502;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, var(--bg) 0%, #0f1429 100%); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

.header { background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 100%); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }

.logo { display: flex; align-items: center; gap: 12px; }
.logo h1 { font-size: 24px; font-weight: 700; color: var(--primary); }

.nav-links { display: flex; gap: 20px; }
.nav-links a { color: var(--text2); text-decoration: none; padding: 8px 16px; border-radius: 6px; transition: all 0.3s; }
.nav-links a:hover { color: var(--primary); background: rgba(0, 212, 255, 0.1); }

.container { max-width: 1400px; margin: 0 auto; padding: 40px; }

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 40px; }
.chart-card { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-height: 400px; }
.chart-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; }
canvas { max-height: 340px; }

.ranking-container { background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }

.ranking-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 24px; }

.ranking-table { width: 100%; border-collapse: collapse; }

.ranking-table thead { display: none; }

.ranking-row { display: grid; grid-template-columns: 1fr 3fr 2fr 2fr 2fr 2fr 2fr 2fr; gap: 16px; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }

.ranking-row:hover { background: rgba(0, 212, 255, 0.05); }

.rank { font-weight: 700; font-size: 18px; color: var(--primary); min-width: 40px; }

.trader-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }

.stat { text-align: center; }
.stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.stat-value { font-size: 16px; font-weight: 700; }

.win { color: var(--success); }
.loss { color: var(--danger); }
.neutral { color: var(--text2); }

.medal { font-size: 20px; margin-right: 4px; }

@media (max-width: 1024px) {
  .ranking-row { grid-template-columns: 1fr 2fr 1fr 1fr; }
  .stat-label { font-size: 9px; }
}

@media (max-width: 768px) {
  .container { padding: 20px; }
  .charts-grid { grid-template-columns: 1fr; }
  .ranking-row { grid-template-columns: 1fr 1.5fr; gap: 8px; padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>🏆 TRADERS RANKING</h1>
  </div>
  <div class="nav-links">
    <a href="index.html">📊 Dashboard</a>
    <a href="upload-trades.html">📥 Upload</a>
    <a href="trading-journal.html">📈 Trading</a>
    <a href="backtesting-journal.html">🎯 Backtesting</a>
  </div>
</div>

<div class="container">
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">📊 Win Rate Comparison</div>
      <canvas id="winRateChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">💰 Total PnL by Trader</div>
      <canvas id="pnlChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">📈 Total Trades</div>
      <canvas id="tradesChart"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">⚡ Profit Factor</div>
      <canvas id="profitFactorChart"></canvas>
    </div>
  </div>

  <div class="ranking-container">
    <div class="ranking-title">🎯 Overall Ranking - Trading</div>
    <div id="trading-ranking"></div>
  </div>

  <div class="ranking-container" style="margin-top: 40px;">
    <div class="ranking-title">🎯 Overall Ranking - Backtesting</div>
    <div id="backtesting-ranking"></div>
  </div>
</div>

<script>
const TRADERS = ['Nassim', 'Noa', 'Joseph', 'Owen', 'Tom'];
const TRADER_COLORS = {
  'Nassim': '#FF4757',
  'Noa': '#2ED573',
  'Joseph': '#FFD93D',
  'Owen': '#00D4FF',
  'Tom': '#A4B0FF'
};

const TRADER_EMOJIS = {
  'Nassim': '🔴',
  'Noa': '🟢',
  'Joseph': '🟡',
  'Owen': '🔵',
  'Tom': '⚪'
};

let charts = {};

function init() {
  updateCharts();
  renderRankings();
  RealtimeSync.init(() => {
    updateCharts();
    renderRankings();
  });
}

function getAllTraderStats() {
  const stats = {};
  TRADERS.forEach(trader => {
    const trades = StorageManager.loadTrades(trader);
    stats[trader] = {
      ...Calculator.calculateStats(trades),
      type: 'trading'
    };
  });
  return stats;
}

function getAllBacktestStats() {
  const stats = {};
  TRADERS.forEach(trader => {
    const backtests = StorageManager.loadBacktests(trader);
    stats[trader] = {
      ...Calculator.calculateStats(backtests),
      type: 'backtesting'
    };
  });
  return stats;
}

function updateCharts() {
  const tradingStats = getAllTraderStats();
  
  // Win Rate Chart
  const wrCtx = document.getElementById('winRateChart').getContext('2d');
  if (charts.wr) charts.wr.destroy();
  charts.wr = new Chart(wrCtx, {
    type: 'bar',
    data: {
      labels: TRADERS,
      datasets: [{
        label: 'Win Rate %',
        data: TRADERS.map(t => tradingStats[t].winRate),
        backgroundColor: TRADERS.map(t => TRADER_COLORS[t]),
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { 
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8890b0' }
        },
        y: { 
          grid: { display: false },
          ticks: { color: '#8890b0' }
        }
      }
    }
  });

  // PnL Chart
  const pnlCtx = document.getElementById('pnlChart').getContext('2d');
  if (charts.pnl) charts.pnl.destroy();
  charts.pnl = new Chart(pnlCtx, {
    type: 'bar',
    data: {
      labels: TRADERS,
      datasets: [{
        label: 'Total RR',
        data: TRADERS.map(t => tradingStats[t].totalRR),
        backgroundColor: TRADERS.map(t => tradingStats[t].totalRR >= 0 ? '#00d977' : '#ff4757'),
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { 
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8890b0' }
        },
        y: { 
          grid: { display: false },
          ticks: { color: '#8890b0' }
        }
      }
    }
  });

  // Trades Chart
  const tradesCtx = document.getElementById('tradesChart').getContext('2d');
  if (charts.trades) charts.trades.destroy();
  charts.trades = new Chart(tradesCtx, {
    type: 'doughnut',
    data: {
      labels: TRADERS,
      datasets: [{
        data: TRADERS.map(t => tradingStats[t].total),
        backgroundColor: TRADERS.map(t => TRADER_COLORS[t]),
        borderColor: '#0a0e27',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { 
          labels: { color: '#8890b0' }
        }
      }
    }
  });

  // Profit Factor Chart
  const pfCtx = document.getElementById('profitFactorChart').getContext('2d');
  if (charts.pf) charts.pf.destroy();
  charts.pf = new Chart(pfCtx, {
    type: 'radar',
    data: {
      labels: TRADERS,
      datasets: [{
        label: 'Profit Factor',
        data: TRADERS.map(t => parseFloat(tradingStats[t].profitFactor) || 0),
        fill: true,
        backgroundColor: 'rgba(0, 212, 255, 0.1)',
        borderColor: '#00d4ff',
        pointBackgroundColor: '#00d4ff',
        pointBorderColor: '#0a0e27',
        pointBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8890b0' },
          min: 0,
          max: 3
        }
      },
      plugins: {
        legend: { labels: { color: '#8890b0' } }
      }
    }
  });
}

function renderRankings() {
  const tradingStats = getAllTraderStats();
  const backtestStats = getAllBacktestStats();

  // Sort traders by win rate (trading)
  const tradingRanked = TRADERS.sort((a, b) => tradingStats[b].winRate - tradingStats[a].winRate);
  const backtestingRanked = TRADERS.sort((a, b) => backtestStats[b].winRate - backtestStats[a].winRate);

  renderRankingTable('trading-ranking', tradingRanked, tradingStats);
  renderRankingTable('backtesting-ranking', backtestingRanked, backtestStats);
}

function renderRankingTable(containerId, rankedTraders, stats) {
  const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  
  const html = rankedTraders.map((trader, idx) => {
    const s = stats[trader];
    return `
      <div class="ranking-row">
        <div class="rank">${medals[idx]}</div>
        <div class="trader-name">${TRADER_EMOJIS[trader]} ${trader}</div>
        <div class="stat"><div class="stat-label">Trades</div><div class="stat-value">${s.total}</div></div>
        <div class="stat"><div class="stat-label">W/L</div><div class="stat-value">${s.wins}/${s.losses}</div></div>
        <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value win">${s.winRate}%</div></div>
        <div class="stat"><div class="stat-label">Total RR</div><div class="stat-value ${s.totalRR >= 0 ? 'win' : 'loss'}">${s.totalRR >= 0 ? '+' : ''}${s.totalRR}</div></div>
        <div class="stat"><div class="stat-label">Avg RR</div><div class="stat-value">${s.avgRR >= 0 ? '+' : ''}${s.avgRR}</div></div>
        <div class="stat"><div class="stat-label">PF</div><div class="stat-value">${s.profitFactor}</div></div>
      </div>
    `;
  }).join('');

  document.getElementById(containerId).innerHTML = html;
}

window.onload = init;
</script>

</body>
</html>
